name: One-Time BTC History Backfill

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill-btc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run BTC backfill script
        run: python backfill_btc.py

      - name: Commit backfilled history_btc.json
        run: |
          git config user.name "sol-alert-bot"
          git config user.email "actions@github.com"
          git add history_btc.json
          git diff --staged --quiet || git commit -m "Backfill BTC history to today"
          git push
