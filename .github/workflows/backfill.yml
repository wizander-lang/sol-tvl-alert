name: One-Time SOL History Backfill (2021–today)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backfill script
        env:
          TVL_MCAP_THRESHOLD: "0.075"
        run: python backfill_history.py

      - name: Commit backfilled history.json
        run: |
          git config user.name "sol-alert-bot"
          git config user.email "actions@github.com"
          git add history.json
          git commit -m "Backfill SOL history from 2021-01-01 to today"
          git push
