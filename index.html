<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Heat Index</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #0a0a0f;
  --panel:    #12131e;
  --border:   #21233a;
  --text:     #e8e9f2;
  --muted:    #5e6378;
  --primary:  #9945FF;
  --accent:   #14F195;
  --cold:     #00C2FF;
  --cool:     #14F195;
  --neutral:  #FFD700;
  --warm:     #FF8C00;
  --hot:      #FF3366;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px 16px 64px;
  max-width: 860px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s, color 0.4s;
}

/* ── Asset nav ────────────────────────────────────────────────────────────── */
.asset-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.asset-nav-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-right: 4px;
}
.asset-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.03em;
  transition: all 0.2s;
}
.asset-btn:hover { border-color: var(--primary); color: var(--text); }
.asset-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.asset-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.8; }

/* ── Header ───────────────────────────────────────────────────────────────── */
.header { margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.025em; display: flex; align-items: center; gap: 10px; }
.asset-logo { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; transition: background 0.4s; }
.header .sub { color: var(--muted); font-size: 0.78rem; margin-top: 5px; padding-left: 36px; }
.date-fmt-toggle { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
.fmt-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.7rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.fmt-btn:hover { border-color: var(--primary); color: var(--text); }
.fmt-btn.active { background: var(--panel); border-color: var(--primary); color: var(--primary); }

/* ── Heat gauge ───────────────────────────────────────────────────────────── */
.gauge-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px 18px; margin-bottom: 12px; }
.gauge-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
.gauge-score-block { line-height: 1; display: flex; align-items: baseline; gap: 6px; }
.gauge-score { font-size: 4rem; font-weight: 900; letter-spacing: -0.04em; display: inline-block; transition: color 0.4s; }
.gauge-denom { font-size: 1.4rem; font-weight: 500; color: var(--muted); }
.gauge-trend { font-size: 0.75rem; font-weight: 700; padding: 3px 8px; border-radius: 10px; align-self: center; white-space: nowrap; }
.gauge-label-col { text-align: right; }
.gauge-action { display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; margin-bottom: 6px; }
.gauge-zone-name { font-size: 0.95rem; font-weight: 700; }
.gauge-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
.gauge-days { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.gauge-bar-wrap { position: relative; margin-bottom: 6px; }
.gauge-bar { height: 14px; border-radius: 7px; background: linear-gradient(to right, #00C2FF 0%, #14F195 25%, #FFD700 50%, #FF8C00 75%, #FF3366 100%); }
.gauge-ticks { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
.gauge-tick { position: absolute; top: 0; width: 1px; height: 14px; background: rgba(10,10,15,0.5); }
.gauge-needle { position: absolute; top: -7px; width: 3px; height: 28px; background: #fff; border-radius: 2px; transform: translateX(-50%); box-shadow: 0 0 12px rgba(255,255,255,0.9); transition: left 0.7s cubic-bezier(0.34,1.56,0.64,1); }
.gauge-needle::after { content:''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-bottom-color: #fff; }
.gauge-axis { display: flex; justify-content: space-between; font-size: 0.67rem; color: var(--muted); margin-top: 4px; padding: 0 1px; }
.gauge-zones { display: flex; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.gauge-zone-cell { flex: 1; text-align: center; padding: 5px 2px; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border-right: 1px solid var(--border); }
.gauge-zone-cell:last-child { border-right: none; }

/* ── Stat grid ────────────────────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; }
@media (min-width: 560px) { .stat-grid { grid-template-columns: repeat(4,1fr); } }
.stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 14px 12px; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 6px; }
.stat-value { font-size: 1.15rem; font-weight: 700; }
.stat-sub { font-size: 0.7rem; margin-top: 3px; color: var(--muted); }
.pos { color: var(--cool); }
.neg { color: var(--hot); }

/* ── Factor breakdown ─────────────────────────────────────────────────────── */
.factor-section-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
.factor-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.factor-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 14px 12px; }
.factor-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px; }
.factor-score { font-size: 1.3rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.factor-detail { font-size: 0.68rem; color: var(--muted); margin-bottom: 10px; min-height: 1em; }
.factor-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.factor-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.factor-weight { font-size: 0.62rem; color: var(--muted); text-align: right; letter-spacing: 0.04em; }

/* ── Range buttons ────────────────────────────────────────────────────────── */
.range-row { display: flex; gap: 6px; margin-bottom: 12px; }
.range-btn { padding: 6px 18px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.03em; transition: all 0.15s; }
.range-btn:hover { border-color: var(--primary); color: var(--text); }
.range-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ── Chart cards ──────────────────────────────────────────────────────────── */
.chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px 16px 12px; margin-bottom: 10px; }
.chart-card h2 { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
canvas { max-height: 220px; }

/* ── Footer ───────────────────────────────────────────────────────────────── */
.footer { color: var(--muted); font-size: 0.72rem; margin-top: 24px; line-height: 1.7; border-top: 1px solid var(--border); padding-top: 16px; }
.footer strong { color: var(--text); }
.error { color: #ff6b6b; padding: 16px; background: rgba(255,107,107,0.07); border-radius: 10px; border: 1px solid rgba(255,107,107,0.2); font-size: 0.85rem; }
</style>
</head>
<body>

<!-- Asset navigation -->
<div class="asset-nav">
  <span class="asset-nav-label">Asset</span>
  <button class="asset-btn active" id="nav-SOL" onclick="switchAsset('SOL')">
    <span class="asset-dot"></span>SOL
  </button>
  <button class="asset-btn" id="nav-BTC" onclick="switchAsset('BTC')">
    <span class="asset-dot"></span>BTC
  </button>
</div>

<div class="header">
  <div class="header-left">
    <h1><div class="asset-logo" id="assetLogo"></div><span id="assetTitle">Heat Index</span></h1>
    <div class="sub" id="assetSub"></div>
  </div>
  <div class="date-fmt-toggle">
    <button class="fmt-btn active" data-fmt="iso" onclick="setDateFmt('iso')">ISO</button>
    <button class="fmt-btn"        data-fmt="us"  onclick="setDateFmt('us')">US</button>
    <button class="fmt-btn"        data-fmt="eu"  onclick="setDateFmt('eu')">EU</button>
  </div>
</div>

<div id="root"><div style="color:var(--muted);font-size:0.85rem;padding:60px 0;text-align:center;letter-spacing:0.05em">LOADING…</div></div>

<div class="footer" id="footerText"></div>

<script>
// ── Asset configuration ───────────────────────────────────────────────────────
const ASSET_CONFIG = {
  SOL: {
    name: 'Solana',
    symbol: 'SOL',
    dataFile: 'history_sol.json',
    logoGradient: 'linear-gradient(135deg, #9945FF, #14F195)',
    subtitle: '3-factor composite signal · updated daily · DefiLlama + CoinCap',
    theme: {
      '--bg':      '#0a0a0f',
      '--panel':   '#12131e',
      '--border':  '#21233a',
      '--primary': '#9945FF',
      '--accent':  '#14F195',
      priceColor:  '#14F195',
      priceFill:   'rgba(20,241,149,0.18)',
    },
    weights: { ma: 0.40, fees: 0.30, tvl: 0.30 },
    footer: `
      <strong>How the score works —</strong>
      The Heat Index is a <strong>composite of three independent signals</strong>, each scored 0–100
      (0 = deep value / buy, 100 = overheated / sell) and weighted together:<br><br>
      <strong>① 200-day MA Position (40%)</strong> — How far today's price sits below or above its 200-day moving
      average. Price deeply below the MA = historically oversold. Price well above = extended. The cleanest
      cycle-positioning signal with no secular drift.<br><br>
      <strong>② Protocol Revenue Yield (30%)</strong> — 30-day average daily fees divided by SOL price. High yield
      (cheap network per dollar of SOL) = fundamentally undervalued. Known distortion: meme coin activity
      can temporarily spike fees, making yield look attractive at price peaks.<br><br>
      <strong>③ TVL / Price (30%)</strong> — Solana DeFi TVL (billions) ÷ SOL price. High ratio = lots of on-chain
      activity per dollar. <strong>Known limitation:</strong> TVL collapsed with FTX in 2022, making this signal
      unreliable in isolation during ecosystem crises.<br><br>
      Data: <strong>DefiLlama</strong> (TVL + fees) · <strong>CoinCap</strong> (price). Not financial advice.`,
  },

  BTC: {
    name: 'Bitcoin',
    symbol: 'BTC',
    dataFile: 'history_btc.json',
    logoGradient: 'linear-gradient(135deg, #F7931A, #FFD700)',
    subtitle: '3-factor composite signal · updated daily · CoinCap + CoinMetrics + Alternative.me',
    theme: {
      '--bg':      '#0f0a00',
      '--panel':   '#1a1200',
      '--border':  '#2e2200',
      '--primary': '#F7931A',
      '--accent':  '#FFD700',
      priceColor:  '#F7931A',
      priceFill:   'rgba(247,147,26,0.18)',
    },
    weights: { ma: 0.45, mvrv: 0.35, fg: 0.20 },
    footer: `
      <strong>How the score works —</strong>
      The Bitcoin Heat Index is a <strong>composite of three independent signals</strong>, each scored 0–100
      (0 = deep value / buy, 100 = overheated / sell) and weighted together:<br><br>
      <strong>① 200-day MA Position (45%)</strong> — How far price sits relative to its 200-day moving average.
      Deeply below = historically oversold across every Bitcoin cycle. The single most reliable
      cycle-positioning signal for BTC.<br><br>
      <strong>② MVRV Z-Score (35%)</strong> — Market Value vs Realised Value Z-Score. Compares current market cap
      to the aggregate cost basis of all Bitcoin holders, normalised by standard deviation. Negative or near-zero
      MVRV = average holder is underwater = genuine capitulation signal, independent of price momentum.<br><br>
      <strong>③ Fear & Greed Index (20%)</strong> — Composite sentiment indicator from Alternative.me. Extreme fear
      historically precedes recoveries; extreme greed precedes corrections. Provides crowd-psychology context
      independent from on-chain data.<br><br>
      Data: <strong>CoinCap</strong> (price) · <strong>CoinMetrics</strong> (MVRV) ·
      <strong>Alternative.me</strong> (Fear &amp; Greed). Not financial advice.`,
  },
};

// ── Zone definitions ──────────────────────────────────────────────────────────
const ZONES = [
  { max: 20,  label: 'Deep Value',  action: 'Strong Buy',  color: '#00C2FF', bg: 'rgba(0,194,255,0.13)'  },
  { max: 40,  label: 'Undervalued', action: 'Accumulate',  color: '#14F195', bg: 'rgba(20,241,149,0.13)' },
  { max: 60,  label: 'Fair Value',  action: 'Neutral',     color: '#FFD700', bg: 'rgba(255,215,0,0.13)'  },
  { max: 80,  label: 'Overvalued',  action: 'Reduce',      color: '#FF8C00', bg: 'rgba(255,140,0,0.13)'  },
  { max: 100, label: 'Overheated',  action: 'Strong Sell', color: '#FF3366', bg: 'rgba(255,51,102,0.13)' },
];
function zone(score) { return ZONES.find(z => score <= z.max) || ZONES[4]; }

// Score → heat color for colored-dot chart
function scoreColor(s) {
  if (s == null) return 'rgba(94,99,120,0.4)';
  if (s <= 20)  return '#00C2FF';
  if (s <= 40)  return '#14F195';
  if (s <= 60)  return '#FFD700';
  if (s <= 80)  return '#FF8C00';
  return '#FF3366';
}

// ── Percentile helpers ────────────────────────────────────────────────────────
function pctScore(val, sortedArr) {
  if (val == null || !sortedArr.length) return null;
  let lo = 0, hi = sortedArr.length;
  while (lo < hi) { const mid = (lo + hi) >>> 1; if (sortedArr[mid] < val) lo = mid + 1; else hi = mid; }
  return Math.round(100 - (lo / sortedArr.length) * 100);
}
function percentileValue(sortedArr, p) {
  const idx = (p / 100) * (sortedArr.length - 1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  return sortedArr[lo] + (sortedArr[hi] - sortedArr[lo]) * (idx - lo);
}

// ── Moving averages ───────────────────────────────────────────────────────────
function compute200dMA(hist) {
  const r = new Array(hist.length).fill(null);
  let sum = 0;
  for (let i = 0; i < hist.length; i++) {
    sum += hist[i].price;
    if (i >= 200) sum -= hist[i - 200].price;
    if (i >= 199) r[i] = sum / 200;
  }
  return r;
}
function compute200wSMA(hist) {
  // 200-week = 1400 days
  const r = new Array(hist.length).fill(null);
  const W = 1400;
  let sum = 0;
  for (let i = 0; i < hist.length; i++) {
    sum += hist[i].price;
    if (i >= W) sum -= hist[i - W].price;
    if (i >= W - 1) r[i] = sum / W;
  }
  return r;
}
function compute30dRolling(hist, field) {
  return hist.map((_, i) => {
    let sum = 0, count = 0;
    for (let j = Math.max(0, i - 29); j <= i; j++) {
      if (hist[j][field] != null) { sum += hist[j][field]; count++; }
    }
    return count > 0 ? sum / count : null;
  });
}

// ── State ─────────────────────────────────────────────────────────────────────
let activeAsset   = 'SOL';
let fullHistory   = [];
let ma200Arr      = [];
let ma200wArr     = [];
let maDevArr      = [];
let fees30dArr    = [];
let feesYieldArr  = [];
let allScores     = [];
let sortedRatios  = [];
let sortedMADev   = [];
let sortedFYield  = [];
let sortedMVRV    = [];
let sortedFG      = [];
let pct           = {};
let activeRange   = '1Y';
let charts        = {};
let hasMVRV       = false;

// ── Process history (asset-aware) ─────────────────────────────────────────────
function processHistory(hist) {
  ma200Arr  = compute200dMA(hist);
  ma200wArr = compute200wSMA(hist);
  maDevArr  = hist.map((h, i) =>
    ma200Arr[i] != null ? (h.price / ma200Arr[i] - 1) * 100 : null
  );

  sortedMADev = maDevArr.filter(x => x != null).sort((a, b) => a - b);

  if (activeAsset === 'SOL') {
    fees30dArr   = compute30dRolling(hist, 'fees_usd');
    feesYieldArr = hist.map((h, i) =>
      (fees30dArr[i] != null && h.price > 0) ? fees30dArr[i] / h.price : null
    );
    sortedRatios = hist.map(h => h.ratio).filter(x => x != null).sort((a, b) => a - b);
    sortedFYield = feesYieldArr.filter(x => x != null).sort((a, b) => a - b);
    pct.p20 = percentileValue(sortedRatios, 20);
    pct.p80 = percentileValue(sortedRatios, 80);

    const cfg = ASSET_CONFIG.SOL;
    allScores = hist.map((h, i) => {
      const s_tvl  = pctScore(h.ratio, sortedRatios);
      const s_ma   = maDevArr[i] != null ? (100 - pctScore(maDevArr[i], sortedMADev)) : null;
      const s_fees = pctScore(feesYieldArr[i], sortedFYield);
      const w_ma   = s_ma   ?? 50;
      const w_fees = s_fees ?? 50;
      const w_tvl  = s_tvl  ?? 50;
      const composite = Math.round(cfg.weights.ma * w_ma + cfg.weights.fees * w_fees + cfg.weights.tvl * w_tvl);
      return { composite, s_ma, s_fees, s_tvl };
    });

  } else { // BTC
    const mvrvArr = hist.map(h => h.mvrv_zscore ?? null);
    const fgArr   = hist.map(h => h.fear_greed   ?? null);
    sortedMVRV = mvrvArr.filter(x => x != null).sort((a, b) => a - b);
    sortedFG   = fgArr.filter(x => x != null).sort((a, b) => a - b);
    hasMVRV    = sortedMVRV.length > 50;

    const cfg = ASSET_CONFIG.BTC;
    allScores = hist.map((h, i) => {
      // All three: high value = expensive = sell = HIGH score → invert pctScore
      const s_ma   = maDevArr[i]  != null ? (100 - pctScore(maDevArr[i],  sortedMADev)) : null;
      const s_mvrv = mvrvArr[i]   != null ? (100 - pctScore(mvrvArr[i],   sortedMVRV))  : null;
      const s_fg   = fgArr[i]     != null ? (100 - pctScore(fgArr[i],     sortedFG))    : null;
      const w_ma   = s_ma   ?? 50;
      const w_mvrv = s_mvrv ?? 50;
      const w_fg   = s_fg   ?? 50;
      const composite = Math.round(cfg.weights.ma * w_ma + cfg.weights.mvrv * w_mvrv + cfg.weights.fg * w_fg);
      return { composite, s_ma, s_mvrv, s_fg };
    });
  }
}

// ── Date formatting ───────────────────────────────────────────────────────────
let dateFmt = 'iso';
function formatDate(isoStr) {
  const [y, m, d] = isoStr.split('-');
  if (dateFmt === 'us') return m + '/' + d + '/' + y;
  if (dateFmt === 'eu') return d + '/' + m + '/' + y;
  return isoStr;
}
function setDateFmt(fmt) {
  dateFmt = fmt;
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.toggle('active', b.dataset.fmt === fmt));
  if (fullHistory.length) renderCharts();
}

// ── Range filter ──────────────────────────────────────────────────────────────
function filterByRange(hist, range) {
  if (range === 'All') return hist;
  const last = new Date(hist[hist.length - 1].date + 'T00:00:00Z');
  const cut  = new Date(last);
  if      (range === '1W') cut.setDate(cut.getDate() - 7);
  else if (range === '1M') cut.setDate(cut.getDate() - 30);
  else if (range === '1Y') cut.setFullYear(cut.getFullYear() - 1);
  else if (range === '5Y') cut.setFullYear(cut.getFullYear() - 5);
  return hist.filter(h => new Date(h.date + 'T00:00:00Z') >= cut);
}

// ── "Days in zone" helper ─────────────────────────────────────────────────────
function daysInCurrentZone(scores, latestZone) {
  let count = 0;
  for (let i = scores.length - 1; i >= 0; i--) {
    if (zone(scores[i].composite).label === latestZone.label) count++;
    else break;
  }
  return count;
}

// ── Zone band plugin ──────────────────────────────────────────────────────────
const bandPlugin = {
  id: 'zoneBands',
  beforeDatasetsDraw(chart, _, opts) {
    if (!opts?.bands) return;
    const { ctx, chartArea: { left, right, top }, scales: { y } } = chart;
    opts.bands.forEach(([lo, hi, color]) => {
      const yTop = y.getPixelForValue(hi);
      const yBot = y.getPixelForValue(lo);
      ctx.save(); ctx.fillStyle = color;
      ctx.fillRect(left, Math.min(yTop, top), right - left, Math.abs(yBot - yTop));
      ctx.restore();
    });
  }
};
Chart.register(bandPlugin);

function chartOpts(overrides = {}) {
  return {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    animation: { duration: 200 },
    plugins: {
      legend: { labels: { color: '#5e6378', font: { size: 11 }, boxWidth: 10, padding: 14 } },
      tooltip: { backgroundColor: '#191a2a', borderColor: '#21233a', borderWidth: 1, titleColor: '#e8e9f2', bodyColor: '#9096b0', padding: 10, cornerRadius: 8 },
      zoneBands: { bands: [] },
      ...(overrides.plugins || {}),
    },
    scales: {
      x: { ticks: { color: '#5e6378', maxTicksLimit: 7, font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.03)' } },
      y: { ticks: { color: '#5e6378', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.03)' }, ...(overrides.yAxis || {}) }
    },
    ...(overrides.root || {}),
  };
}

// ── Render charts ─────────────────────────────────────────────────────────────
function renderCharts() {
  const cfg     = ASSET_CONFIG[activeAsset];
  const view    = filterByRange(fullHistory, activeRange);
  const indices = view.map(h => fullHistory.indexOf(h));
  const labels  = view.map(h => formatDate(h.date));
  // Dot size: visible for shorter ranges, tiny for full history
  const ptR = view.length > 500 ? 1.5 : view.length > 90 ? 2.5 : 4;

  const composites = indices.map(i => allScores[i].composite);
  const prices     = view.map(h => h.price);
  const ma200View  = indices.map(i => ma200Arr[i]);
  const ma200wView = indices.map(i => ma200wArr[i]);
  // Colored dots for price chart
  const dotColors  = indices.map(i => scoreColor(allScores[i]?.composite));

  Object.values(charts).forEach(c => c?.destroy());
  charts = {};

  // ── Composite score chart ──
  const scoreBands = [
    [0,20,'rgba(0,194,255,0.06)'],[20,40,'rgba(20,241,149,0.06)'],
    [40,60,'rgba(255,215,0,0.06)'],[60,80,'rgba(255,140,0,0.06)'],[80,100,'rgba(255,51,102,0.06)'],
  ];
  charts.score = new Chart(document.getElementById('scoreChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Composite Score',
        data: composites,
        borderColor: cfg.theme['--primary'],
        borderWidth: 2,
        backgroundColor: ctx => {
          const { ctx: c, chartArea: a } = ctx.chart;
          if (!a) return 'rgba(153,69,255,0.1)';
          const g = c.createLinearGradient(0, a.top, 0, a.bottom);
          g.addColorStop(0, 'rgba(255,51,102,0.18)');
          g.addColorStop(1, 'rgba(0,194,255,0.02)');
          return g;
        },
        fill: true, tension: 0.35, pointRadius: ptR,
        pointBackgroundColor: dotColors,
        pointBorderWidth: 0,
      }],
    },
    options: chartOpts({
      plugins: {
        zoneBands: { bands: scoreBands },
        tooltip: {
          callbacks: {
            label: ctx => {
              const i = indices[ctx.dataIndex];
              const s = allScores[i];
              const lines = ['  Composite: ' + ctx.parsed.y + '/100 — ' + zone(ctx.parsed.y).action,
                             '  MA Position: ' + (s.s_ma ?? '—')];
              if (activeAsset === 'SOL') {
                lines.push('  Rev Yield:   ' + (s.s_fees ?? '—'));
                lines.push('  TVL/Price:   ' + (s.s_tvl ?? '—'));
              } else {
                lines.push('  MVRV Z-Score: ' + (s.s_mvrv ?? '—'));
                lines.push('  Fear & Greed: ' + (s.s_fg   ?? '—'));
              }
              return lines;
            }
          }
        }
      },
      yAxis: { min: 0, max: 100, ticks: { color: '#5e6378', font: { size: 10 }, stepSize: 20 } },
    }),
  });

  // ── Price + MA chart (with colored dots) ──
  const priceDatasets = [
    {
      label: activeAsset + ' Price (USD)',
      data: prices,
      borderColor: cfg.theme.priceColor,
      borderWidth: 2,
      backgroundColor: ctx => {
        const { ctx: c, chartArea: a } = ctx.chart;
        if (!a) return cfg.theme.priceFill;
        const g = c.createLinearGradient(0, a.top, 0, a.bottom);
        g.addColorStop(0, cfg.theme.priceFill);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        return g;
      },
      fill: true, tension: 0.3,
      pointRadius: ptR,
      pointBackgroundColor: dotColors,
      pointBorderWidth: 0,
      order: 1,
    },
    {
      label: '200d MA',
      data: ma200View,
      borderColor: 'rgba(255,140,0,0.7)',
      borderWidth: 1.5,
      borderDash: [5, 4],
      pointRadius: 0,
      fill: false, tension: 0.3, order: 2,
    },
  ];
  if (activeAsset === 'BTC') {
    priceDatasets.push({
      label: '200w SMA',
      data: ma200wView,
      borderColor: 'rgba(255,215,0,0.5)',
      borderWidth: 1.5,
      borderDash: [2, 5],
      pointRadius: 0,
      fill: false, tension: 0.3, order: 3,
    });
  }
  charts.price = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { labels, datasets: priceDatasets },
    options: chartOpts({
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return null;
              return '  ' + ctx.dataset.label + ': $' + v.toLocaleString(undefined, { maximumFractionDigits: 2 });
            }
          }
        }
      }
    }),
  });

  // ── Asset-specific charts ──
  if (activeAsset === 'SOL') {
    const feesRaw     = view.map(h => h.fees_usd);
    const fees30dView = indices.map(i => fees30dArr[i]);
    const ratios      = view.map(h => h.ratio);
    const thresholds  = view.map(h => h.threshold);

    charts.extra1 = new Chart(document.getElementById('extraChart1'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Daily Fees (USD)', data: feesRaw, borderColor: 'rgba(255,215,0,0.3)', borderWidth: 1, pointRadius: 0, fill: false, tension: 0.2, order: 2 },
          { label: '30d Avg Fees', data: fees30dView, borderColor: '#FFD700', borderWidth: 2, pointRadius: ptR, fill: true, backgroundColor: 'rgba(255,215,0,0.06)', tension: 0.3, order: 1 },
        ],
      },
      options: chartOpts({
        plugins: {
          tooltip: { callbacks: { label: ctx => {
            const v = ctx.parsed.y;
            if (v == null) return null;
            return '  ' + ctx.dataset.label + ': ' + (v >= 1e6 ? '$' + (v/1e6).toFixed(2) + 'M' : '$' + (v/1e3).toFixed(1) + 'k');
          }}}
        },
        yAxis: { ticks: { color: '#5e6378', font: { size: 10 }, callback: v => v >= 1e6 ? '$' + (v/1e6).toFixed(1) + 'M' : '$' + (v/1e3).toFixed(0) + 'k' } }
      }),
    });

    charts.extra2 = new Chart(document.getElementById('extraChart2'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'TVL(B)/Price', data: ratios, borderColor: '#9945FF', borderWidth: 2, backgroundColor: 'rgba(153,69,255,0.07)', fill: true, tension: 0.3, pointRadius: ptR, order: 1 },
          { label: 'Alert threshold', data: thresholds, borderColor: '#FFD700', borderDash: [6,4], borderWidth: 1.5, pointRadius: 0, fill: false, order: 2 },
          { label: 'Buy zone (80th %ile)', data: Array(labels.length).fill(pct.p80), borderColor: 'rgba(0,194,255,0.5)', borderDash: [3,6], borderWidth: 1.5, pointRadius: 0, fill: false, order: 3 },
          { label: 'Sell zone (20th %ile)', data: Array(labels.length).fill(pct.p20), borderColor: 'rgba(255,51,102,0.5)', borderDash: [3,6], borderWidth: 1.5, pointRadius: 0, fill: false, order: 4 },
        ],
      },
      options: chartOpts({
        plugins: { tooltip: { callbacks: { label: ctx => {
          if (ctx.dataset.label === 'TVL(B)/Price') {
            const i = indices[ctx.dataIndex];
            return '  TVL(B)/Price: ' + ctx.parsed.y.toFixed(4) + '  (factor score ' + (allScores[i].s_tvl ?? '—') + ')';
          }
          return '  ' + ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(4);
        }}}}
      }),
    });

  } else { // BTC
    const mvrvView = indices.map(i => fullHistory[i]?.mvrv_zscore ?? null);
    const fgView   = indices.map(i => fullHistory[i]?.fear_greed  ?? null);

    charts.extra1 = new Chart(document.getElementById('extraChart1'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'MVRV Z-Score',
            data: mvrvView,
            borderColor: '#F7931A',
            borderWidth: 2,
            backgroundColor: 'rgba(247,147,26,0.07)',
            fill: true, tension: 0.3, pointRadius: ptR, order: 1,
          },
        ],
      },
      options: chartOpts({
        plugins: {
          zoneBands: { bands: [[-1, -0.5, 'rgba(0,194,255,0.1)'], [7, 12, 'rgba(255,51,102,0.08)']] },
          tooltip: { callbacks: { label: ctx => {
            const v = ctx.parsed.y;
            if (v == null) return null;
            const i = indices[ctx.dataIndex];
            return ['  MVRV Z-Score: ' + v.toFixed(2), '  Factor score: ' + (allScores[i]?.s_mvrv ?? '—')];
          }}}
        },
        yAxis: { ticks: { color: '#5e6378', font: { size: 10 } } }
      }),
    });

    charts.extra2 = new Chart(document.getElementById('extraChart2'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Fear & Greed Index',
            data: fgView,
            borderColor: '#FFD700',
            borderWidth: 2,
            backgroundColor: ctx => {
              const { ctx: c, chartArea: a } = ctx.chart;
              if (!a) return 'rgba(255,215,0,0.07)';
              const g = c.createLinearGradient(0, a.top, 0, a.bottom);
              g.addColorStop(0, 'rgba(255,51,102,0.2)');
              g.addColorStop(0.5, 'rgba(255,215,0,0.05)');
              g.addColorStop(1, 'rgba(0,194,255,0.15)');
              return g;
            },
            fill: true, tension: 0.3, pointRadius: ptR, order: 1,
          },
          { label: 'Extreme Fear (25)', data: Array(labels.length).fill(25), borderColor: 'rgba(0,194,255,0.4)', borderDash: [4,5], borderWidth: 1, pointRadius: 0, fill: false, order: 2 },
          { label: 'Extreme Greed (75)', data: Array(labels.length).fill(75), borderColor: 'rgba(255,51,102,0.4)', borderDash: [4,5], borderWidth: 1, pointRadius: 0, fill: false, order: 3 },
        ],
      },
      options: chartOpts({
        plugins: {
          zoneBands: { bands: [[0,25,'rgba(0,194,255,0.06)'], [75,100,'rgba(255,51,102,0.06)']] },
          tooltip: { callbacks: { label: ctx => {
            const v = ctx.parsed.y;
            if (v == null) return null;
            const label = v <= 25 ? 'Extreme Fear' : v <= 45 ? 'Fear' : v <= 55 ? 'Neutral' : v <= 75 ? 'Greed' : 'Extreme Greed';
            return '  F&G: ' + Math.round(v) + ' — ' + label;
          }}}
        },
        yAxis: { min: 0, max: 100, ticks: { color: '#5e6378', font: { size: 10 }, stepSize: 25, callback: v => ['Extreme Fear','Fear','Neutral','Greed','Extreme Greed'][v/25] || v } }
      }),
    });
  }
}

function setRange(r) {
  activeRange = r;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', b.dataset.r === r));
  renderCharts();
}

// ── Apply theme ───────────────────────────────────────────────────────────────
function applyTheme(asset) {
  const t = ASSET_CONFIG[asset].theme;
  const root = document.documentElement;
  root.style.setProperty('--bg',      t['--bg']);
  root.style.setProperty('--panel',   t['--panel']);
  root.style.setProperty('--border',  t['--border']);
  root.style.setProperty('--primary', t['--primary']);
  root.style.setProperty('--accent',  t['--accent']);
  document.body.style.background = t['--bg'];
  document.querySelectorAll('.range-btn.active, .asset-btn.active').forEach(b => {
    b.style.background = t['--primary'];
    b.style.borderColor = t['--primary'];
  });
}

// ── Render full UI ────────────────────────────────────────────────────────────
function renderUI() {
  const cfg      = ASSET_CONFIG[activeAsset];
  const root     = document.getElementById('root');
  const latest   = fullHistory[fullHistory.length - 1];
  const lastIdx  = fullHistory.length - 1;
  const lScore   = allScores[lastIdx];
  const z        = zone(lScore.composite);

  // Trend: compare to 7 days ago
  const prevIdx  = Math.max(0, lastIdx - 7);
  const prevComp = allScores[prevIdx].composite;
  const delta    = lScore.composite - prevComp;
  const trending = delta > 2 ? 'heating' : delta < -2 ? 'cooling' : 'stable';
  const trendArrow = trending === 'heating' ? '▲' : trending === 'cooling' ? '▼' : '–';
  const trendColor = trending === 'heating' ? '#FF8C00' : trending === 'cooling' ? '#14F195' : '#5e6378';
  const trendTip   = trending === 'heating' ? 'Getting hotter (more expensive)' : trending === 'cooling' ? 'Getting colder (better value)' : 'Stable';

  // Days in zone
  const diz = daysInCurrentZone(allScores, z);

  // Factor breakdown
  const maDevNow = maDevArr[lastIdx];
  const maDetail = maDevNow != null ? (maDevNow >= 0 ? '+' : '') + maDevNow.toFixed(1) + '% vs 200d avg' : 'Insufficient history';

  let factors;
  if (activeAsset === 'SOL') {
    const fyNow = feesYieldArr[lastIdx];
    factors = [
      { label: '200d MA Position', score: lScore.s_ma,   detail: maDetail,  weight: '40%' },
      { label: 'Revenue Yield',    score: lScore.s_fees,  detail: fyNow != null ? (fyNow * 1000).toFixed(3) + ' fees/$k price' : 'No fee data yet', weight: '30%' },
      { label: 'TVL / Price',      score: lScore.s_tvl,   detail: 'TVL(B)/Price ' + (latest.ratio?.toFixed(4) ?? '—'), weight: '30%' },
    ];
  } else {
    const mvrvNow = latest.mvrv_zscore;
    const fgNow   = latest.fear_greed;
    const fgLabel = fgNow != null ? (fgNow <= 25 ? 'Extreme Fear' : fgNow <= 45 ? 'Fear' : fgNow <= 55 ? 'Neutral' : fgNow <= 75 ? 'Greed' : 'Extreme Greed') : null;
    factors = [
      { label: '200d MA Position', score: lScore.s_ma,   detail: maDetail, weight: '45%' },
      { label: 'MVRV Z-Score',     score: lScore.s_mvrv, detail: mvrvNow != null ? 'Z-Score: ' + mvrvNow.toFixed(2) : 'No MVRV data', weight: '35%' },
      { label: 'Fear & Greed',     score: lScore.s_fg,   detail: fgNow != null ? fgNow + ' — ' + fgLabel : 'No F&G data', weight: '20%' },
    ];
  }

  // Stat cards
  let statCards;
  if (activeAsset === 'SOL') {
    const chg = latest.price_change_pct_24h;
    const chgHtml = chg != null ? `<div class="stat-sub ${chg >= 0 ? 'pos' : 'neg'}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}% 24h</div>` : '';
    statCards = `
      <div class="stat-card"><div class="stat-label">SOL Price</div>
        <div class="stat-value">$${latest.price.toLocaleString(undefined,{maximumFractionDigits:2})}</div>${chgHtml}</div>
      <div class="stat-card"><div class="stat-label">TVL (DeFi)</div>
        <div class="stat-value">$${(latest.tvl/1e9).toFixed(2)}B</div></div>
      <div class="stat-card"><div class="stat-label">Daily Revenue</div>
        <div class="stat-value">${latest.fees_usd!=null?'$'+(latest.fees_usd>=1e6?(latest.fees_usd/1e6).toFixed(2)+'M':(latest.fees_usd/1e3).toFixed(0)+'k'):'—'}</div></div>
      <div class="stat-card"><div class="stat-label">Signal</div>
        <div class="stat-value" style="color:${z.color}">${z.action}</div>
        <div class="stat-sub" style="color:${z.color}">${z.label}</div></div>`;
  } else {
    const mvrvNow = latest.mvrv_zscore;
    const fgNow   = latest.fear_greed;
    statCards = `
      <div class="stat-card"><div class="stat-label">BTC Price</div>
        <div class="stat-value">$${latest.price.toLocaleString(undefined,{maximumFractionDigits:0})}</div></div>
      <div class="stat-card"><div class="stat-label">MVRV Z-Score</div>
        <div class="stat-value">${mvrvNow!=null?mvrvNow.toFixed(2):'—'}</div>
        <div class="stat-sub">${mvrvNow!=null?(mvrvNow<0?'Capitulation zone':mvrvNow<2?'Undervalued':mvrvNow<5?'Fair value':'Overheated'):''}</div></div>
      <div class="stat-card"><div class="stat-label">Fear & Greed</div>
        <div class="stat-value">${fgNow!=null?fgNow:'—'}</div>
        <div class="stat-sub">${fgNow!=null?(fgNow<=25?'Extreme Fear':fgNow<=45?'Fear':fgNow<=55?'Neutral':fgNow<=75?'Greed':'Extreme Greed'):''}</div></div>
      <div class="stat-card"><div class="stat-label">Signal</div>
        <div class="stat-value" style="color:${z.color}">${z.action}</div>
        <div class="stat-sub" style="color:${z.color}">${z.label}</div></div>`;
  }

  const chartTitle1 = activeAsset === 'SOL' ? 'Protocol Revenue — Daily Fees (USD)' : 'MVRV Z-Score (on-chain holder profitability)';
  const chartTitle2 = activeAsset === 'SOL' ? 'TVL(B) / Price Ratio' : 'Fear & Greed Index';
  const priceTitle  = activeAsset === 'SOL'
    ? 'SOL Price + 200-Day Moving Average'
    : 'BTC Price + 200d MA + 200-Week SMA (bear market floor)';

  root.innerHTML = `
    <div class="gauge-card">
      <div class="gauge-top">
        <div class="gauge-score-block">
          <span class="gauge-score" style="color:${z.color}">${lScore.composite}</span>
          <span class="gauge-denom">/ 100</span>
          <span class="gauge-trend" style="background:${trendColor}22;color:${trendColor}" title="${trendTip}">${trendArrow} ${trending}</span>
        </div>
        <div class="gauge-label-col">
          <span class="gauge-action" style="background:${z.bg};color:${z.color}">${z.action}</span>
          <div class="gauge-zone-name" style="color:${z.color}">${z.label}</div>
          <div class="gauge-sub">Composite signal · ${formatDate(latest.date)}</div>
          <div class="gauge-days">${diz} day${diz!==1?'s':''} in ${z.label} zone</div>
        </div>
      </div>
      <div class="gauge-bar-wrap">
        <div class="gauge-bar"></div>
        <div class="gauge-ticks">
          <div class="gauge-tick" style="left:20%"></div><div class="gauge-tick" style="left:40%"></div>
          <div class="gauge-tick" style="left:60%"></div><div class="gauge-tick" style="left:80%"></div>
        </div>
        <div class="gauge-needle" style="left:${lScore.composite}%"></div>
      </div>
      <div class="gauge-axis">
        <span>0 — Deep Value (Buy)</span><span>50 — Fair Value</span><span>100 — Overheated (Sell)</span>
      </div>
      <div class="gauge-zones">
        ${ZONES.map(z2=>`<div class="gauge-zone-cell" style="background:${z2.bg};color:${z2.color}">${z2.label}</div>`).join('')}
      </div>
    </div>

    <div class="stat-grid">${statCards}</div>

    <div class="factor-section-label">Score breakdown</div>
    <div class="factor-grid">
      ${factors.map(f => {
        const s = f.score ?? 50;
        const fz = zone(s);
        return `<div class="factor-card">
          <div class="factor-label">${f.label}</div>
          <div class="factor-score" style="color:${f.score!=null?fz.color:'var(--muted)'}">${f.score??'—'}<span style="font-size:0.8rem;font-weight:500;color:var(--muted)"> /100</span></div>
          <div class="factor-detail">${f.detail}</div>
          <div class="factor-bar-wrap"><div class="factor-bar-fill" style="width:${s}%;background:${fz.color}"></div></div>
          <div class="factor-weight">${f.weight} weight</div>
        </div>`;
      }).join('')}
    </div>

    <div class="range-row">
      ${['1W','1M','1Y','5Y','All'].map(r =>
        `<button class="range-btn${r===activeRange?' active':''}" data-r="${r}" onclick="setRange('${r}')">${r}</button>`
      ).join('')}
    </div>

    <div class="chart-card">
      <h2>Composite Heat Score (0 = Deep Value · 100 = Overheated)</h2>
      <canvas id="scoreChart"></canvas>
    </div>
    <div class="chart-card">
      <h2>${priceTitle}</h2>
      <canvas id="priceChart"></canvas>
    </div>
    <div class="chart-card">
      <h2>${chartTitle1}</h2>
      <canvas id="extraChart1"></canvas>
    </div>
    <div class="chart-card">
      <h2>${chartTitle2}</h2>
      <canvas id="extraChart2"></canvas>
    </div>
    <div style="color:var(--muted);font-size:0.7rem;margin-top:8px">
      ${fullHistory.length} days of history · ${formatDate(fullHistory[0].date)} to ${formatDate(latest.date)}
    </div>`;

  renderCharts();
}

// ── Asset switching ───────────────────────────────────────────────────────────
async function switchAsset(asset) {
  if (asset === activeAsset && fullHistory.length) return;
  activeAsset = asset;

  // Update nav buttons
  document.querySelectorAll('.asset-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'nav-' + asset);
  });

  // Update header
  const cfg = ASSET_CONFIG[asset];
  document.getElementById('assetLogo').style.background = cfg.logoGradient;
  document.getElementById('assetTitle').textContent = cfg.name + ' Heat Index';
  document.getElementById('assetSub').textContent   = cfg.subtitle;
  document.getElementById('footerText').innerHTML   = cfg.footer;

  applyTheme(asset);

  const root = document.getElementById('root');
  root.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:60px 0;text-align:center;letter-spacing:0.05em">LOADING…</div>';

  try {
    const res = await fetch(cfg.dataFile + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    fullHistory = await res.json();
  } catch (e) {
    root.innerHTML = `<div class="error">Could not load ${cfg.dataFile}: ${e.message}<br><br>
      ${asset === 'BTC' ? 'Run the <strong>One-Time BTC History Backfill</strong> workflow from the GitHub Actions tab to generate this file.' : 'Trigger the backfill workflow from the Actions tab.'}</div>`;
    return;
  }
  if (!Array.isArray(fullHistory) || !fullHistory.length) {
    root.innerHTML = `<div class="error">${cfg.dataFile} is empty — trigger the backfill workflow.</div>`;
    return;
  }

  processHistory(fullHistory);
  renderUI();
}

function boot() {
  switchAsset('SOL');
}

boot();
</script>
</body>
</html>
